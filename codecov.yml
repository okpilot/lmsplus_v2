# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 2%
    patch:
      default:
        target: 50%

flags:
  web:
    paths:
      - apps/web/
    carryforward: true
  db:
    paths:
      - packages/db/
    carryforward: true

ignore:
  - "**/*.config.*"
  - "**/e2e/**"

comment:
  layout: header,diff,flags,files,footer
  behavior: default
  require_changes: coverage_drop
