pre-commit:
  parallel: false
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    type-check:
      run: pnpm check-types
    test:
      run: pnpm test
    audit:
      run: pnpm audit --audit-level=high
