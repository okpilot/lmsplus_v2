# ============================================================================
# Lefthook — Automated QA Pipeline (mechanical gates only)
# ============================================================================
#
# Layer 1: pre-commit  — BLOCKING — catches broken code before git history
# Layer 2: commit-msg  — BLOCKING — enforces conventional commits
# Layer 3: pre-push    — BLOCKING — security gate (final defense)
#
# NOTE: Code review, doc updates, and test writing are NOT here.
# They run as Claude Code subagents (Agent tool) after commits so findings
# flow back into the conversation and get fixed immediately.
# See CLAUDE.md workflow section.
# ============================================================================

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    type-check:
      run: pnpm check-types
    # Forbid `.is('deleted_at', …)` on tables with no deleted_at column (#925).
    # glob makes lefthook skip this when no .ts files are staged, so the script's
    # no-arg whole-tree branch is never reached from the hook.
    soft-delete-guard:
      glob: "*.{ts,tsx}"
      run: node .claude/hooks/check-soft-delete-guard.mjs {staged_files}
    # Forbid impl-detail leakage in NEWLY-added it()/test() titles (code-style.md §7, #946).
    # Diff-scoped + grandfathered: the script reads `git diff --cached` and checks only
    # added titles, so pre-existing `maps <token>` titles never block a commit.
    test-title-leakage:
      glob: "*.test.{ts,tsx}"
      run: node .claude/hooks/check-test-title-leakage.mjs {staged_files}
    # Full test suite runs in CI (ci.yml). Pre-commit runs fast gates only.
    # test:
    #   run: pnpm test

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit "{1}"

post-commit:
  commands:
    agent-reminder:
      run: "if [ -f .claude/hooks/post-commit-reminder.sh ]; then bash .claude/hooks/post-commit-reminder.sh; fi"

pre-push:
  parallel: true
  commands:
    security-auditor:
      run: "if [ -f .claude/hooks/run-security-auditor.sh ]; then bash .claude/hooks/run-security-auditor.sh; fi"
    audit:
      run: pnpm audit --audit-level=high
