# ============================================================================
# Lefthook — Automated QA Pipeline
# ============================================================================
# Layer 1: pre-commit   — BLOCKING, fast — catches broken code before git history
# Layer 2: commit-msg   — BLOCKING       — enforces conventional commits
# Layer 3: post-commit  — NON-BLOCKING   — async agent feedback (review, docs, tests)
# Layer 4: pre-push     — BLOCKING       — security gate (final defense)
# ============================================================================

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    type-check:
      run: pnpm check-types
    test:
      run: pnpm test

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

post-commit:
  parallel: true
  commands:
    code-reviewer:
      run: bash .claude/hooks/run-code-reviewer.sh
    doc-updater:
      run: bash .claude/hooks/run-doc-updater.sh
    test-writer:
      run: bash .claude/hooks/run-test-writer.sh

pre-push:
  parallel: true
  commands:
    security-auditor:
      run: bash .claude/hooks/run-security-auditor.sh
    audit:
      run: pnpm audit --audit-level=high
