pre-commit:
  parallel: false
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

post-commit:
  parallel: true
  commands:
    code-reviewer:
      run: bash .claude/hooks/run-code-reviewer.sh
    doc-updater:
      run: bash .claude/hooks/run-doc-updater.sh
    test-writer:
      run: bash .claude/hooks/run-test-writer.sh

pre-push:
  parallel: true
  commands:
    type-check:
      run: pnpm check-types
    test:
      run: pnpm test
    audit:
      run: pnpm audit --audit-level=high
    security-auditor:
      run: bash .claude/hooks/run-security-auditor.sh
