# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
tone_instructions: >
  Be precise and direct. Lead with the issue, not the explanation.
  Include file path + line number. Suggest the exact fix.
  Acknowledge good patterns briefly. No fluff.

reviews:
  profile: "assertive"
  high_level_summary: true
  poem: false
  sequence_diagrams: false
  collapse_walkthrough: true
  request_changes_workflow: true

  path_filters:
    - "!**/.turbo/**"
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/coverage/**"
    - "!**/pnpm-lock.yaml"

  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords: ["WIP", "draft", "DO NOT MERGE"]

  # ── Path-specific rules (mirrors .claude/rules/code-style.md) ──────────

  path_instructions:
    # Page files — composition only, no logic
    - path: "apps/web/app/**/page.tsx"
      instructions: |
        Next.js App Router page. STRICT rules:
        - Max 80 lines. If exceeded, page has logic that belongs in _components/.
        - Pure composition: imports + one async function + JSX return. Nothing else.
        - No useState, useEffect, or event handlers.
        - Data fetching via imported async functions, not inline queries.
        - No direct Supabase client usage.

    # Components — single responsibility
    - path: "apps/web/app/**/_components/*.tsx"
      instructions: |
        React component. Enforce:
        - Max 150 lines. Split if exceeded.
        - Single responsibility — if description needs "and", split it.
        - No direct Supabase queries (data comes via props or Server Components).
        - No useEffect for data fetching (Next.js anti-pattern).
        - Default to Server Components. Only add 'use client' at lowest interactive boundary.
        - Functions max 30 lines, max 3 params (use options object otherwise).
        - Max 3 nesting levels — use early returns.
        - Use Next.js <Image> instead of <img> (Biome noImgElement). Suppress only when dimensions are unknown.
        - Click handlers on static elements need paired keyboard handlers (Biome useKeyWithClickEvents).
        - Static elements must not have interaction handlers without an appropriate role (Biome noStaticElementInteractions).

    # Server Actions — validated mutations
    - path: "apps/web/app/**/actions.ts"
      instructions: |
        Server Action file. Enforce:
        - 'use server' directive at top of file.
        - Max 100 lines. Split by feature area if exceeded.
        - ALL inputs validated with Zod schema (.parse()) before use.
        - Auth check first: call requireAuth() and verify user before any mutation.
        - No service role key (adminClient) — that lives in packages/db/src/admin.ts only.
        - Explicit return types on all exported functions.
        - No `any` type — use `unknown` with narrowing.
        - Destructure { error } from ALL Supabase mutation calls (.insert/.update/.delete/.upsert).
        - For ANY DELETE or UPDATE expected to mutate rows (RLS-scoped, admin-context, or test-cleanup),
          chain .select('id') and verify data?.length. Supabase returns 200 OK with zero rows when the
          filter matches nothing or RLS blocks — no error is thrown.

    # Hooks — small and focused
    - path: "apps/web/app/**/_hooks/use-*.ts"
      instructions: |
        Custom React hook. Enforce:
        - Max 80 lines. Extract logic to util if exceeded.
        - No useEffect for data fetching.
        - No direct Supabase calls.

    # TypeScript — type safety
    - path: "**/*.ts"
      instructions: |
        TypeScript source. Enforce:
        - No `any` type — use `unknown` with narrowing.
        - No type casting of unvalidated external data via `as SubmitAnswerInput`.
        - When casting DB/RPC results via `as unknown as T`, pair the cast with runtime guards (Array.isArray, typeof checks, etc).
        - All Zod-validated inputs must use .parse() before use, not `as` casts.
        - PostgREST embedded resources MUST use `!fk_column` (FK-hint), NOT `:fk_column` (alias).
          The `:` form silently returns null on resolution failure; `!` errors loudly. Reserve `:`
          for genuine column-rename only, never as a substitute for FK expansion.

    # Database package — security critical
    - path: "packages/db/src/**/*.ts"
      instructions: |
        Database utility (SECURITY CRITICAL). Enforce:
        - Max 200 lines.
        - SECURITY DEFINER RPCs must have manual auth.uid() check + SET search_path = public.
        - No hard DELETE anywhere — always UPDATE SET deleted_at = now().
        - Service role key (adminClient): ONLY in packages/db/src/admin.ts. Flag if used elsewhere.
        - Never return raw question options with correct answers to student-facing code.
        - Use get_quiz_questions() RPC which strips correct answers.

    # SQL migrations — RLS mandatory
    - path: "packages/db/migrations/**/*.sql"
      instructions: |
        Database migration (SECURITY AUDIT). Enforce:
        - Every CREATE TABLE must have ALTER TABLE ... ENABLE ROW LEVEL SECURITY + FORCE ROW LEVEL SECURITY.
        - RLS policies need BOTH USING (read) AND WITH CHECK (write) clauses.
        - Mutable tables must have deleted_at TIMESTAMPTZ NULL column.
        - Immutable tables (student_responses, quiz_session_answers, audit_events): no UPDATE or DELETE policies.
        - audit_events is append-only. No UPDATE/DELETE policies. Ever.
        - SECURITY DEFINER functions: auth.uid() check + SET search_path = public.
        - Max 300 lines per migration file.
        - Audit-event INSERT subqueries: every INSERT INTO audit_events block inside a
          SECURITY DEFINER function must filter deleted_at IS NULL on any user/session/
          question/membership FK lookup used to populate actor_id, actor_role, or
          session-derived columns. The outer auth guard does not cover these independent
          subqueries. Flag any INSERT INTO audit_events subquery missing AND deleted_at IS NULL.

    - path: "supabase/migrations/**/*.sql"
      instructions: |
        Same rules as packages/db/migrations. See above.

    # Tests — behavioral naming + navigation mock URL assertions
    - path: "**/*.test.{ts,tsx}"
      instructions: |
        Test file. Enforce:
        - Test names describe behavior, not implementation.
          Good: 'schedules a shorter review interval when the answer is wrong'
          Bad: 'calls updateFsrsState'
        - Disallowed it() title patterns (impl-detail leakage) — flag these:
          - 'forwards X to <InternalName>' (camelCase or PascalCase) — names an
            internal helper, hook, or component (e.g., 'to handleSubmitSession',
            'to AnswerOptions', 'to QuizSession'). Describe the outcome instead.
          - 'from <PascalCaseType>(Opts|Config|Args)' — names an internal type.
            Describe the populated output, not the input type's name.
          - 'through <camelCaseName>(' or 'via <camelCaseName>(' — names the
            function under test; describe() already provides that context.
          - '(non-positive|typeof|isFinite|NaN) guard' — names a specific
            validator branch. Describe what input is rejected.
          - '(activates|does not activate) the guard' — internal navigation/
            validation guard machinery. Describe the user-observable consequence
            (e.g., 'does not warn when no answers exist').
          - 'matches <PascalCaseType>' or 'matches <internal helper>' — asserts
            congruence with internal type/helper. Describe externally observable
            behavior.
          Permitted (these are public contracts, not impl):
          - 'calls onClick when the button is clicked' — onClick is a public prop.
          - 'calls signInWithPassword on valid submit' — public SDK method.
          - 'does not call the RPC when the input is empty' — externally
            observable side-effect.
          Borderline tiebreaker: public props, public callbacks, public SDK
          methods, and RPC names visible at the integration boundary are part
          of behavior. Internal helpers, validator branches, and private types
          are implementation.
        - Omit narrative comments above it() if the test name fully describes
          the behaviour. Comments paraphrasing the title rot when the title
          changes. Reserve comments for non-obvious WHY: hidden invariants,
          jsdom workarounds, ordering constraints.
        - When renaming a test title to be behavior-first, audit any inline
          comment inside the test body. Comments often describe an implementation
          scenario broader than the renamed (more specific) test exercises —
          drop stale comments unless they explain a non-obvious WHY.
        - Co-located with source file (same folder).
        - One test file per source file.
        - Mock external deps (Supabase, fetch), don't call real services.
        - Router mock URL assertion: any assertion on router.push / router.replace /
          redirect from next/navigation MUST check the URL/path argument, not just
          .toHaveBeenCalled(). Flag: expect(mockPush).toHaveBeenCalled() with no
          argument check. Suggest: .toHaveBeenCalledWith('/expected/path').
          Note: router.back() is zero-argument — assert the observable navigation
          result (final URL or history state), not a destination string.
        - Lifecycle integration test for feature modes: if the diff introduces a mode
          or flag branch (isExam, mode === 'X', isAdmin, etc.), verify that a lifecycle
          test exists in the diff covering entry → in-progress → exit → post-exit URL.
          Component-level toggle tests are not sufficient alone.
        - Reload test for stateful UI: if the diff adds a hook or component holding
          state in localStorage or in-memory across renders, verify a test simulates
          reload with empty local state against an active server session.

    # E2E Playwright specs — hermiticity (cross-spec state pollution)
    - path: "apps/web/e2e/**/*.spec.ts"
      instructions: |
        Playwright E2E spec. Enforce hermiticity — cross-spec state pollution is
        the #1 cause of CI flake-that-isn't-flake (issue #587). Specs share a
        Supabase project, so a spec mutating seed without cleanup poisons every
        downstream spec in the same project's alphabetical run order.
        - Any mutation of shared seed data (questions, students, sessions, configs)
          must restore in `test.afterEach` (or `afterAll` for describe-scoped fixtures).
          Read-only specs and specs that only mutate per-test throwaway rows tied
          to a unique marker do not need afterEach.
        - Test-created rows must carry a stable marker prefix in a queryable column
          (e.g. `question_text LIKE '[E2E_ADMIN_Q]%'`, `email LIKE 'e2e-student-mgmt-%'`).
          Marker constants must be EXPORTED from a shared helper module — flag
          inline magic strings like `'e2e-test-' + Date.now()` not anchored to a const.
        - Cleanup that touches tables with FK children must use soft-delete
          (UPDATE deleted_at = now()), not hard DELETE. FK children of `questions`:
          student_responses, quiz_session_answers, flagged_questions,
          question_comments. Hard DELETE risks 23503 violations and breaks
          docs/security.md rule 6.
        - Cleanup helpers must chain `.select('id')` and gate logging on
          `data.length > 0` per code-style.md §5 (zero-row no-op rule). Silent
          on filter-only tests; observable when something actually changed.
        - Cleanup helpers themselves need Vitest unit tests (co-located in
          helpers/*.test.ts) covering: org-lookup error path, each mutation error
          path, no-op silence, each log path. Use the vi.hoisted + buildChain
          queue/shift pattern when the helper makes multiple sequential calls on
          the same table.

    # Environment files — block immediately
    - path: "**/.env*"
      instructions: |
        CRITICAL: .env files must NEVER be committed. Block this PR immediately.
        Check for leaked secrets: API keys, service role keys, database URLs.

    # Config files
    - path: "apps/web/next.config.ts"
      instructions: |
        Check that security headers are preserved:
        - Content-Security-Policy, X-Frame-Options, X-Content-Type-Options
        - Strict-Transport-Security, Referrer-Policy, Permissions-Policy
        Flag if any security header is removed or weakened.

  # ── Pre-merge checks ───────────────────────────────────────────────────

  pre_merge_checks:
    title:
      mode: "warning"
      requirements: |
        Must follow Conventional Commits: feat:, fix:, docs:, test:, refactor:, ci:, chore:

    custom_checks:
      - mode: "error"
        name: "no-secrets"
        instructions: |
          Scan for leaked secrets in the diff:
          - Patterns: eyJ (JWT), sk_live_, service_role, sbp_, -----BEGIN, SUPABASE_SERVICE_ROLE
          - .env files committed
          - NEXT_PUBLIC_ env vars containing secret keys
          - Hardcoded Supabase URLs or API keys in source files
          In test files, ignore only explicit fake placeholder values
          (e.g., 'test-service-role-key', 'fake-key', 'mock-token').
          Continue scanning test files for all other secret patterns.
          Block if any real secret value is found.

      - mode: "error"
        name: "no-answer-exposure"
        instructions: |
          Check for correct answer exposure:
          - Direct SELECT * FROM questions or .select('*') on questions table
          - Returning raw options JSONB with correct:true to student-facing code
          - Any path that bypasses get_quiz_questions() RPC for active quiz sessions
          EXCEPTION: Post-session report queries (e.g. getQuizReport) that SELECT
          questions server-side and strip the correct field before returning to the
          client are acceptable. The student has already answered — showing the correct
          answer is intentional feedback. Verify BOTH: (1) the stripping logic removes
          `correct` from options before returning to the client, AND (2) the query
          confirms the session is completed (ended_at IS NOT NULL) before fetching
          question data. Block if either condition is missing.

      - mode: "warning"
        name: "soft-delete-only"
        instructions: |
          Flag any hard DELETE in application code or migrations on mutable tables:
          organizations, users, question_banks, questions, courses, lessons.
          Must use UPDATE SET deleted_at = now() instead.

  # ── Tools ──────────────────────────────────────────────────────────────

  tools:
    biome:
      enabled: true
    eslint:
      enabled: false
    prettier:
      enabled: false
    stylelint:
      enabled: false

  # ── Code quality overrides ─────────────────────────────────────────────

  code_quality:
    docstrings:
      enabled: false  # We use typed signatures + descriptive names instead of docstrings

# ── Knowledge base ─────────────────────────────────────────────────────

knowledge_base:
  opt_out: false
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
