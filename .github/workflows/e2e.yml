name: E2E & Integration Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '25'
  PNPM_VERSION: '9.15.0'

jobs:
  migration-test:
    name: Migration Test (clean reset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 2.78.1

      - name: Start local Supabase
        run: supabase start

      - name: Reset DB (apply all migrations from scratch)
        run: supabase db reset --no-seed

      - name: Verify all migrations applied
        run: |
          set -e
          EXPECTED=$(ls supabase/migrations/*.sql | wc -l | tr -d ' ')
          ACTUAL=$(PGPASSWORD=postgres psql -h localhost -p 54322 -U postgres -d postgres -t -c \
            "SELECT count(*) FROM supabase_migrations.schema_migrations;" | tr -d ' ')
          echo "Expected: $EXPECTED | Applied: $ACTUAL"
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "ERROR: Migration count mismatch"
            exit 1
          fi

  integration-tests:
    name: Integration Tests (Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 2.78.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start local Supabase
        run: supabase start

      - name: Export Supabase env vars
        run: |
          eval "$(supabase status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=${API_URL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> $GITHUB_ENV

      - name: Type-check integration tests
        run: pnpm --filter @repo/db check-types:integration

      - name: Run integration tests
        run: pnpm --filter @repo/db test:integration

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 2.78.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @repo/web exec playwright install --with-deps chromium

      - name: Start local Supabase
        run: supabase start

      - name: Export Supabase env vars
        run: |
          eval "$(supabase status -o env)"
          # Use localhost (not 127.0.0.1) — Chromium treats them as different origins
          echo "NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> $GITHUB_ENV

      - name: Write .env.local for Next.js
        run: |
          printf '%s\n' \
            "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}" \
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
            "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" \
            > apps/web/.env.local

      - name: Seed test data
        run: pnpm --filter @repo/web exec tsx scripts/seed-e2e.ts

      - name: Build app
        run: pnpm build

      - name: Verify Supabase is healthy
        run: |
          echo "Checking Supabase API..."
          curl -sf http://localhost:54321/auth/v1/health || {
            echo "Supabase auth unhealthy — restarting..."
            supabase stop && supabase start
            sleep 5
            curl -sf http://localhost:54321/auth/v1/health
          }
          echo "Supabase services:"
          docker ps --format 'table {{.Names}}\t{{.Status}}' | grep supabase || true

      - name: Run Playwright tests
        run: pnpm --filter @repo/web e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: apps/web/test-results/
          retention-days: 7
