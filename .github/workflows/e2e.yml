name: E2E & Integration Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  migration-test:
    name: Migration Test (clean reset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v1
        with:
          version: 2.78.1

      - name: Start local Supabase
        run: supabase start

      - name: Reset DB (apply all migrations from scratch)
        run: supabase db reset --no-seed

      - name: Verify all migrations applied
        run: |
          set -e
          EXPECTED=$(ls supabase/migrations/*.sql | wc -l | tr -d ' ')
          ACTUAL=$(PGPASSWORD=postgres psql -h localhost -p 54322 -U postgres -d postgres -t -c \
            "SELECT count(*) FROM supabase_migrations.schema_migrations;" | tr -d ' ')
          echo "Expected: $EXPECTED | Applied: $ACTUAL"
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "ERROR: Migration count mismatch"
            exit 1
          fi

  integration-tests:
    name: Integration Tests (Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v1
        with:
          version: 2.78.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start local Supabase
        run: supabase start

      - name: Wait for Supabase readiness
        run: bash .github/scripts/wait-for-supabase.sh

      - name: Export Supabase env vars
        run: |
          eval "$(supabase status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=${API_URL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> $GITHUB_ENV

      - name: Type-check integration tests
        run: pnpm --filter @repo/db check-types:integration

      - name: Run integration tests
        run: pnpm --filter @repo/db test:integration

      # App-layer integration tier (#925): real apps/web query helpers + Server
      # Actions against the same already-running Supabase container.
      - name: Type-check app-layer integration tests
        run: pnpm --filter @repo/web check-types:integration

      - name: Run app-layer integration tests
        run: pnpm --filter @repo/web test:integration

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v1
        with:
          version: 2.78.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @repo/web exec playwright install --with-deps chromium

      - name: Start local Supabase
        run: supabase start

      - name: Wait for Supabase readiness
        run: bash .github/scripts/wait-for-supabase.sh

      - name: Export Supabase env vars
        run: |
          eval "$(supabase status -o env)"
          # Use localhost (not 127.0.0.1) — Chromium treats them as different origins
          echo "NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> $GITHUB_ENV
          # Server Actions (e.g. sendInternalExamCodeEmail) read this at runtime to build app links;
          # must equal the Playwright baseURL so the email path runs instead of erroring out.
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> $GITHUB_ENV

      - name: Write .env.local for Next.js
        run: |
          printf '%s\n' \
            "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}" \
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
            "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}" \
            "NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}" \
            > apps/web/.env.local

      - name: Seed test data
        run: pnpm --filter @repo/web exec tsx scripts/seed-e2e.ts

      - name: Build app
        run: pnpm build

      - name: Run Playwright tests
        run: pnpm --filter @repo/web e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: apps/web/test-results/
          retention-days: 7
