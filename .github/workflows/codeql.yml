name: "CodeQL"

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: "30 5 * * 1" # Monday 05:30 UTC (offset from e2e nightly at 03:00)
  workflow_dispatch: # manual re-runs for security-sensitive changes

permissions:
  security-events: write
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
