name: "CodeQL"

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: "30 5 * * 1" # Monday 05:30 UTC (offset from e2e nightly at 03:00)
  workflow_dispatch: # manual re-runs for security-sensitive changes

permissions:
  security-events: write
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
