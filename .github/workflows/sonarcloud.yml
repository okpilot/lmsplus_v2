name: SonarCloud

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      # FAIL CLOSED on master: a missing SONAR_TOKEN must not silently report green
      # on push builds. Fork PRs (which never see the secret) still skip silently below.
      - name: Fail if SONAR_TOKEN missing on master push
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo '::error::SONAR_TOKEN missing — SonarCloud silently disabled'
            exit 1
          fi

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history for blame and new code detection
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        if: env.SONAR_TOKEN != ''
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: env.SONAR_TOKEN != ''
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: env.SONAR_TOKEN != ''
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        if: env.SONAR_TOKEN != ''
        run: pnpm coverage
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: SonarQube Cloud Scan
        if: env.SONAR_TOKEN != ''
        # Migrated from the deprecated sonarcloud-github-action. SONAR_TOKEN is
        # inherited from the job-level env; org/project keys live in
        # sonar-project.properties; SONAR_HOST_URL is not needed for SonarQube Cloud.
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          # Forwarded to the Sonar Scanner CLI for PR decoration — keep it.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip notice
        if: env.SONAR_TOKEN == ''
        run: echo "::notice::SonarCloud scan skipped — SONAR_TOKEN secret not configured"
