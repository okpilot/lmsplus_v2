name: Dead Code Scanner

on:
  schedule:
    - cron: '0 6 * * 0' # Sunday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  knip:
    name: Knip Dead Code Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@5b4374b04084dc1f9032b52464284b769ac5059e # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run knip
        id: knip
        run: |
          set +e
          OUTPUT=$(pnpm knip 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          {
            echo 'report<<KNIP_EOF'
            echo "$OUTPUT"
            echo 'KNIP_EOF'
          } >> $GITHUB_OUTPUT

      - name: Create or update issue
        if: steps.knip.outputs.exit_code != '0'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const title = '🔍 Dead code report (knip)';
            const body = `## Weekly dead code scan — ${new Date().toISOString().split('T')[0]}

            \`\`\`
            ${process.env.KNIP_REPORT}
            \`\`\`

            This is an automated report from [knip](https://knip.dev/). Review findings and clean up as needed.

            _Generated by dead-code.yml workflow_`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tech-debt',
              creator: 'github-actions[bot]'
            });

            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              console.log(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['tech-debt']
              });
              console.log(`Created issue #${created.data.number}`);
            }
        env:
          KNIP_REPORT: ${{ steps.knip.outputs.report }}

      - name: Close issue if clean
        if: steps.knip.outputs.exit_code == '0'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const title = '🔍 Dead code report (knip)';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tech-debt',
              creator: 'github-actions[bot]'
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed'
              });
              console.log(`Closed issue #${existing.number} — codebase is clean`);
            }
