name: Agent System Health

on:
  schedule:
    - cron: '0 7 * * 0' # Sunday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Agent System Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run health checks
        id: checks
        run: |
          set -euo pipefail
          TODAY=$(date -u +%Y-%m-%d)

          # Trim leading/trailing whitespace with sed, not xargs — xargs errors on
          # unbalanced backticks/apostrophes in table cells/titles and silently drops
          # the row/section. Shared by Check 3 (learner table) and Check 5 (drift titles).
          trim() { sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }

          # ─────────────────────────────────────────────────────────────────
          # Check 1: Orphan specs — .spec.ts files not mentioned in attack-surface.md
          # ─────────────────────────────────────────────────────────────────
          # NOTE: attack-surface.md lives under red-team/topics/ since the PR #704 native-subagent-memory migration.
          ATTACK_SURFACE=".claude/agent-memory/red-team/topics/attack-surface.md"
          REDTEAM_DIR="apps/web/e2e/redteam"
          ORPHAN_LIST=""

          for spec_path in "$REDTEAM_DIR"/*.spec.ts; do
            [ -f "$spec_path" ] || continue
            basename_spec=$(basename "$spec_path")
            if ! grep -qF "$basename_spec" "$ATTACK_SURFACE" 2>/dev/null; then
              ORPHAN_LIST="${ORPHAN_LIST}- \`${basename_spec}\`\n"
            fi
          done || true

          if [ -n "$ORPHAN_LIST" ]; then
            ORPHAN_SECTION="### Orphan Specs
          ⚠️ Spec files not referenced in \`attack-surface.md\`:
          $(printf '%b' "$ORPHAN_LIST")"
          else
            ORPHAN_SECTION="### Orphan Specs
          ✅ All specs mapped"
          fi

          # ─────────────────────────────────────────────────────────────────
          # Check 2: Stale vector mappings — specs referenced in attack-surface.md that don't exist
          # ─────────────────────────────────────────────────────────────────
          STALE_LIST=""

          while IFS= read -r line; do
            # Extract filename from table rows containing .spec.ts
            spec_name=$(echo "$line" | grep -oP '[\w-]+\.spec\.ts' | head -1) || true
            [ -z "$spec_name" ] && continue
            # Skip if it's a header or helper file pattern
            [[ "$spec_name" == *"helper"* ]] && continue
            if [ ! -f "$REDTEAM_DIR/$spec_name" ]; then
              STALE_LIST="${STALE_LIST}- \`${spec_name}\`\n"
            fi
          done < <(grep -P '^\|' "$ATTACK_SURFACE" 2>/dev/null | grep '\.spec\.ts' || true)

          if [ -n "$STALE_LIST" ]; then
            STALE_SECTION="### Stale Vector Mappings
          ⚠️ Spec files referenced in \`attack-surface.md\` but missing on disk:
          $(printf '%b' "$STALE_LIST")"
          else
            STALE_SECTION="### Stale Vector Mappings
          ✅ All mappings valid"
          fi

          # ─────────────────────────────────────────────────────────────────
          # Check 3: Stuck learner patterns — count >= 2 with Watch status (not promoted)
          # ─────────────────────────────────────────────────────────────────
          # NOTE: the learner journal is MEMORY.md since PR #704 (patterns.md no longer exists; agent-memory.md forbids recreating it).
          PATTERNS_FILE=".claude/agent-memory/learner/MEMORY.md"
          STUCK_LIST=""

          while IFS= read -r row; do
            # Parse pipe-delimited table row: | Issue Type | Count | Last Seen | Status |
            # Fields (leading "|" makes $1 empty): $2 Issue Type, $3 Count, $5 Status.
            count_field=$(echo "$row" | awk -F'|' '{print $3}' | trim)
            status_field=$(echo "$row" | awk -F'|' '{print $5}' | trim)
            issue_field=$(echo "$row" | awk -F'|' '{print $2}' | trim)

            [ -z "$count_field" ] && continue
            [ -z "$status_field" ] && continue
            [ -z "$issue_field" ] && continue

            # Skip header rows
            [[ "$count_field" == "Count" ]] && continue
            [[ "$count_field" == "---"* ]] && continue

            # Parse numeric count from field that may contain text like "2 | ..."
            count_num=$(echo "$count_field" | grep -oP '^\d+' | head -1) || true
            [ -z "$count_num" ] && continue

            # Check count >= 2
            if [ "$count_num" -ge 2 ] 2>/dev/null; then
              # Status must contain "Watch" (case-insensitive)
              if echo "$status_field" | grep -qi "watch"; then
                # Status must NOT contain any promoted keywords
                if ! echo "$status_field" | grep -qiE "(rule|candidate|added|applied|exists)"; then
                  # Truncate issue name for readability
                  short_issue=$(echo "$issue_field" | cut -c1-80)
                  STUCK_LIST="${STUCK_LIST}- **${short_issue}** (count: ${count_num})\n"
                fi
              fi
            fi
          done < <(grep -P '^\|' "$PATTERNS_FILE" 2>/dev/null || true)

          if [ -n "$STUCK_LIST" ]; then
            STUCK_SECTION="### Stuck Learner Patterns
          ⚠️ Patterns with count ≥ 2 still in Watch status (not promoted to rule):
          $(printf '%b' "$STUCK_LIST")"
          else
            STUCK_SECTION="### Stuck Learner Patterns
          ✅ No stuck patterns"
          fi

          # ─────────────────────────────────────────────────────────────────
          # Check 4: Agent memory staleness — files not touched in > 14 days
          # ─────────────────────────────────────────────────────────────────
          NOW_EPOCH=$(date +%s)
          STALE_MEM_LIST=""
          THRESHOLD=1209600  # 14 days in seconds

          while IFS= read -r mem_file; do
            [ -f "$mem_file" ] || continue
            last_ts=$(git log -1 --format="%ct" -- "$mem_file" 2>/dev/null) || true
            [ -z "$last_ts" ] && continue
            age_secs=$(( NOW_EPOCH - last_ts ))
            if [ "$age_secs" -gt "$THRESHOLD" ]; then
              age_days=$(( age_secs / 86400 ))
              rel_path="${mem_file#./}"
              STALE_MEM_LIST="${STALE_MEM_LIST}- \`${rel_path}\` (${age_days} days)\n"
            fi
          # security-auditor/findings.md is a deferred-by-design empty placeholder
          # (agent-memory.md: "no memory until it accumulates real content") — exclude it.
          done < <(find .claude/agent-memory -name "*.md" -type f -not -path '*/security-auditor/findings.md' 2>/dev/null || true)

          if [ -n "$STALE_MEM_LIST" ]; then
            STALE_MEM_SECTION="### Agent Memory Staleness
          ⚠️ Files not updated in > 14 days:
          $(printf '%b' "$STALE_MEM_LIST")"
          else
            STALE_MEM_SECTION="### Agent Memory Staleness
          ✅ All files fresh"
          fi

          # ─────────────────────────────────────────────────────────────────
          # Check 5: CodeRabbit drift — code-style.md sections without CodeRabbit coverage
          # ─────────────────────────────────────────────────────────────────
          CODE_STYLE=".claude/rules/code-style.md"
          CODERABBIT=".coderabbit.yaml"
          DRIFT_LIST=""

          while IFS= read -r section_line; do
            # Extract section title after "## N. "
            # trim (not xargs): a future title with an apostrophe/backtick would make
            # xargs error and || true would silently skip that section. Same fix as Check 3.
            title=$(echo "$section_line" | sed 's/^## [0-9]*\. *//' | trim)
            [ -z "$title" ] && continue
            # Use first word as keyword, stemmed so e.g. "Testing" matches
            # ".coderabbit.yaml"'s "test" coverage block. Strip a trailing "ing",
            # then a true-plural "s" (only when not preceded by another "s", so
            # "Class"/"Success" keep their double-s and aren't mangled to "clas").
            # (next.js stems to next.j — a literal substring of "Next.js" in .coderabbit.yaml.)
            raw_keyword=$(echo "$title" | awk '{print $1}' | tr '[:upper:]' '[:lower:]')
            keyword=$(echo "$raw_keyword" | sed -E 's/ing$//; s/([^s])s$/\1/')
            # Fall back to the unstemmed keyword if the stem is too short to
            # match safely (e.g. a future "Ms" title → "m" would match anything).
            if [ "${#keyword}" -lt 3 ]; then
              keyword="$raw_keyword"
            fi
            [ -z "$keyword" ] && continue
            # grep -F: keyword is a literal, not a regex — "next.js"'s "." must not act as a wildcard.
            if ! grep -Fqi "$keyword" "$CODERABBIT" 2>/dev/null; then
              DRIFT_LIST="${DRIFT_LIST}- **${title}** (keyword: \`${keyword}\`)\n"
            fi
          done < <(grep -P '^## [0-9]+\.' "$CODE_STYLE" 2>/dev/null || true)

          if [ -n "$DRIFT_LIST" ]; then
            DRIFT_SECTION="### CodeRabbit Drift
          ⚠️ Code-style sections with no matching coverage in \`.coderabbit.yaml\`:
          $(printf '%b' "$DRIFT_LIST")"
          else
            DRIFT_SECTION="### CodeRabbit Drift
          ✅ All sections covered"
          fi

          # ─────────────────────────────────────────────────────────────────
          # Aggregate findings and set outputs
          # ─────────────────────────────────────────────────────────────────
          HAS_FINDINGS="false"
          for section in "$ORPHAN_SECTION" "$STALE_SECTION" "$STUCK_SECTION" "$STALE_MEM_SECTION" "$DRIFT_SECTION"; do
            if echo "$section" | grep -q '⚠️'; then
              HAS_FINDINGS="true"
              break
            fi
          done

          REPORT="## Weekly agent system health — ${TODAY}

          ${ORPHAN_SECTION}

          ${STALE_SECTION}

          ${STUCK_SECTION}

          ${STALE_MEM_SECTION}

          ${DRIFT_SECTION}

          _Generated by agent-health.yml workflow_"

          echo "has_findings=${HAS_FINDINGS}" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<HEALTH_EOF'
            echo "$REPORT"
            echo 'HEALTH_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update issue (findings)
        if: steps.checks.outputs.has_findings == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = '🤖 Agent system health report';
            const body = process.env.HEALTH_REPORT;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tech-debt',
              creator: 'github-actions[bot]'
            });

            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              console.log(`Updated issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['tech-debt']
              });
              console.log(`Created issue #${created.data.number}`);
            }
        env:
          HEALTH_REPORT: ${{ steps.checks.outputs.report }}

      - name: Close issue if clean
        if: steps.checks.outputs.has_findings == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = '🤖 Agent system health report';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tech-debt',
              creator: 'github-actions[bot]'
            });

            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
                state_reason: 'completed'
              });
              console.log(`Closed issue #${existing.number} — all checks clean`);
            } else {
              console.log('No open issue to close — system is clean');
            }
