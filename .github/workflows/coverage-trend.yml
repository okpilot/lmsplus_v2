name: Coverage Trend

on:
  schedule:
    - cron: '30 7 * * 0' # Sunday 07:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  coverage-trend:
    name: Coverage Trend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Find previous successful run
        id: prev-run
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'coverage-trend.yml',
              status: 'success',
              per_page: 1,
            });
            const runId = runs.data.workflow_runs[0]?.id || '';
            core.setOutput('run_id', runId ? String(runId) : '');
            core.info(runId ? `Previous successful run: ${runId}` : 'No previous successful run found');

      - name: Download previous baseline artifact
        if: steps.prev-run.outputs.run_id != ''
        id: download-baseline
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: coverage-baseline
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.prev-run.outputs.run_id }}

      - name: Run coverage
        id: run-coverage
        shell: bash
        run: |
          set +e
          set -o pipefail
          pnpm coverage 2>&1 | tee /tmp/coverage-output.txt
          COVERAGE_EXIT=${PIPESTATUS[0]}
          set -e
          echo "coverage_exit=$COVERAGE_EXIT" >> "$GITHUB_OUTPUT"

      - name: Parse lcov and compare
        id: parse-and-compare
        shell: bash
        run: |
          parse_lcov() {
            local file="$1"
            if [ ! -f "$file" ]; then echo "0 0 0 0 0 0"; return; fi
            awk -F: '/^LH:/{lh+=$2} /^LF:/{lf+=$2} /^BRH:/{brh+=$2} /^BRF:/{brf+=$2} /^FNH:/{fnh+=$2} /^FNF:/{fnf+=$2} END{print lh,lf,brh,brf,fnh,fnf}' "$file"
          }

          # Aggregate lcov data from both packages
          read WEB_LH WEB_LF WEB_BRH WEB_BRF WEB_FNH WEB_FNF \
            <<< "$(parse_lcov apps/web/coverage/lcov.info)"
          read DB_LH DB_LF DB_BRH DB_BRF DB_FNH DB_FNF \
            <<< "$(parse_lcov packages/db/coverage/lcov.info)"

          TOTAL_LH=$((WEB_LH  + DB_LH))
          TOTAL_LF=$((WEB_LF  + DB_LF))
          TOTAL_BRH=$((WEB_BRH + DB_BRH))
          TOTAL_BRF=$((WEB_BRF + DB_BRF))
          TOTAL_FNH=$((WEB_FNH + DB_FNH))
          TOTAL_FNF=$((WEB_FNF + DB_FNF))

          # Compute percentages with python3 to avoid bash float issues
          CURRENT_JSON=$(python3 - <<PYEOF
          lh, lf   = $TOTAL_LH, $TOTAL_LF
          brh, brf = $TOTAL_BRH, $TOTAL_BRF
          fnh, fnf = $TOTAL_FNH, $TOTAL_FNF

          lines     = round(lh  / lf  * 100, 2) if lf  > 0 else 0.0
          branches  = round(brh / brf * 100, 2) if brf > 0 else 0.0
          functions = round(fnh / fnf * 100, 2) if fnf > 0 else 0.0

          import json
          print(json.dumps({"lines": lines, "branches": branches, "functions": functions}))
          PYEOF
          )

          echo "current_json=$CURRENT_JSON" >> "$GITHUB_OUTPUT"

          # Resolve baseline: prefer downloaded artifact, fall back to seed file
          BASELINE_FILE="coverage-baseline.json"
          if [ ! -f "$BASELINE_FILE" ]; then
            BASELINE_FILE=".github/coverage-baseline.json"
          fi

          if [ -f "$BASELINE_FILE" ]; then
            BASELINE_JSON=$(cat "$BASELINE_FILE")
          else
            # No baseline at all — treat current run as baseline; no regression possible
            BASELINE_JSON="$CURRENT_JSON"
          fi

          # Only write new baseline if coverage ran successfully
          if [ "${{ steps.run-coverage.outputs.coverage_exit }}" = "0" ]; then
            echo "$CURRENT_JSON" > coverage-baseline.json
          else
            echo "::warning::Coverage run failed (exit ${{ steps.run-coverage.outputs.coverage_exit }}) — preserving previous baseline"
            # Copy prior baseline so upload step has something (or skip upload)
            if [ -f "$BASELINE_FILE" ]; then
              cp "$BASELINE_FILE" coverage-baseline.json
            fi
          fi

          # Compare and write outputs to GITHUB_OUTPUT
          python3 - <<PYEOF >> "$GITHUB_OUTPUT"
          import json

          current  = json.loads('$CURRENT_JSON')
          baseline = json.loads('$BASELINE_JSON')

          THRESHOLD = 2.0
          regression = False
          rows = []

          for metric in ("lines", "branches", "functions"):
              before = baseline.get(metric, 0.0)
              after  = current.get(metric,  0.0)
              delta  = after - before
              flag   = ""
              if delta < -THRESHOLD:
                  regression = True
                  flag = " ⚠️"
              rows.append(f"| {metric.capitalize()} | {before:.2f}% | {after:.2f}% | {delta:+.2f}%{flag} |")

          table = "\n".join(rows)
          print(f"regression={'true' if regression else 'false'}")
          print("table<<EOF")
          print(table)
          print("EOF")
          PYEOF

      - name: Upload new baseline artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-baseline
          path: coverage-baseline.json
          retention-days: 90
          overwrite: true

      - name: Create or update regression issue
        if: steps.parse-and-compare.outputs.regression == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          TABLE: ${{ steps.parse-and-compare.outputs.table }}
        with:
          script: |
            const table = process.env.TABLE;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);

            const body = [
              `## Coverage regression detected`,
              ``,
              `A metric dropped more than 2 percentage points compared to the previous baseline.`,
              ``,
              `| Metric | Before | After | Delta |`,
              `|--------|--------|-------|-------|`,
              table,
              ``,
              `**Date:** ${today}`,
              `**Workflow run:** ${runUrl}`,
            ].join('\n');

            const title = '📉 Coverage regression detected';

            // Look for an existing open issue with this title
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tech-debt',
              creator: 'github-actions[bot]',
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['tech-debt'],
              });
              core.info(`Created issue #${created.number}`);
            }

      - name: Close regression issue if coverage recovered
        if: steps.parse-and-compare.outputs.regression == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const title = '📉 Coverage regression detected';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tech-debt',
              creator: 'github-actions[bot]',
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Coverage has recovered. Closing this issue. ([Workflow run](${runUrl}))`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
              core.info(`Closed issue #${existing.number} — coverage recovered`);
            } else {
              core.info('No open regression issue found — nothing to close');
            }
