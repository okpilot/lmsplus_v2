name: DB Deploy

# Auto-applies Supabase migrations to production on merge to master.
#
# Why: PR #652 (2026-05-20) shipped app code that called a new RPC, but the
# migration introducing that RPC was never applied to prod — exam-config page
# 500'd until the migration was applied manually. Issue #654 tracks closing
# this gap permanently.
#
# Behavior:
#   - Triggers only when supabase/migrations/** changes on master.
#   - Dry-runs first to surface what will apply (visible in workflow logs).
#   - Then applies via `supabase db push`. Idempotent: already-applied migrations
#     are skipped via the remote migration_history table.
#   - Fails loudly if remote has migrations not in the local tree — indicates
#     drift that should not be silently reconciled (see PR #641 incident).

on:
  push:
    branches: [master]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Serialize migration pushes — never run two at once against the same prod DB.
  group: db-deploy-prod
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: uepvblipahxizozxvwjn

jobs:
  push:
    name: Apply migrations to prod
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v1
        with:
          version: 2.78.1

      # Build the connection URL explicitly and pass via --db-url. The CLI's
      # `link + SUPABASE_DB_PASSWORD env var` path was rejecting valid pooler
      # credentials with SCRAM/SASL auth failures (observed 2026-05-21 across
      # three password resets). Constructing the URL ourselves routes around
      # that code path. Session pooler (port 5432) is used because direct DB
      # (port 5432 on db.<ref>.supabase.co) is IPv6-only on Supabase.
      - name: Build DB URL
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set on this repo. Add it under Settings → Secrets and variables → Actions before re-running." >&2
            exit 1
          fi
          PW_ENC=$(jq -nr --arg p "$SUPABASE_DB_PASSWORD" '$p|@uri')
          echo "::add-mask::$PW_ENC"
          DB_URL="postgresql://postgres.${SUPABASE_PROJECT_REF}:${PW_ENC}@aws-1-eu-central-1.pooler.supabase.com:5432/postgres"
          echo "::add-mask::$DB_URL"
          echo "DB_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Dry-run (preview pending migrations)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --dry-run --db-url "$DB_URL"

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        # `--include-all` skipped intentionally — push only files in supabase/migrations
        # whose version_number is missing from remote migration_history.
        run: supabase db push --yes --db-url "$DB_URL"
