version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
    labels:
      - tech-debt
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # npm — whole pnpm workspace, managed from the root.
  #
  # The root "/" entry is pnpm-workspace-aware: it updates the dependency
  # manifests of all workspace members declared in pnpm-workspace.yaml AND
  # the single shared root pnpm-lock.yaml together, in one PR. (Verified by
  # PR #692, which bumped @sentry/nextjs + shadcn in apps/web and
  # @supabase/supabase-js in BOTH apps/web and packages/db, with a synced
  # lockfile, in one green PR.)
  #
  # Why this is a single entry (not one per package): per-directory npm
  # entries made dependabot open a SEPARATE PR per package for the same
  # shared dependency. One @supabase/supabase-js 2.106.1 -> 2.106.2 bump
  # produced #669 (packages/db) and #670 (apps/web) as separate PRs — each
  # touched only its own package.json and neither updated the shared root
  # pnpm-lock.yaml. Result: `pnpm install --frozen-lockfile` failed in CI on
  # both, and the half-applied bump left a workspace version skew that split
  # SupabaseClient<Database> into two incompatible copies (TS2345). The same
  # bump was ALSO carried by the root entry's #692, so it existed in three
  # overlapping PRs at once. Consolidating to the root entry makes every
  # workspace-wide dependency move atomically with a synced lockfile.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore"
    labels:
      - tech-debt
    groups:
      # Low-risk: batch into one PR meant to merge quickly.
      npm-all-minor-patch:
        update-types:
          - minor
          - patch
      # Higher-risk: batch majors into their own PR for deliberate review /
      # migration, so they don't block the minor/patch batch above. Every
      # update still lands in a grouped PR — never a per-package one.
      #
      # `exclude-patterns` BELOW IS THE LOAD-BEARING PIECE. Drop it and
      # typescript simply falls back into npm-all-major — a silent GROUPING
      # change, not a config error: Dependabot reports no error and opens the
      # grouped PR as usual. The breakage only shows up LATER, when that PR's
      # CI fails because the TS7 major is bundled in with the other majors —
      # i.e. exactly the unmergeable-majors-PR situation this split removes.
      # The grouping decision itself is observable only in the repo's
      # Dependabot run log (/network/updates), never at config-lint time.
      #
      # (Order matters only as a general rule — a dependency joins the first
      # group it matches, in file order — but these two groups are mutually
      # exclusive by construction, so reordering them alone would not break
      # the split.)
      npm-all-major:
        exclude-patterns:
          - "typescript"
        update-types:
          - major
      # typescript majors get their own PR because TS 7 is blocked UPSTREAM:
      # Next.js cannot build under typescript@7 (it dropped lib/typescript.js
      # and moved the compiler API to ./unstable/* entrypoints, so Next's TS
      # probe reports "do not have the required package(s) installed" and the
      # build worker exits 1 — reproduced on next 16.2.10 AND 16.2.11; note
      # `tsc --noEmit` itself passes). A grouped PR merges all-or-nothing, so
      # leaving typescript in npm-all-major would make EVERY future majors PR
      # unmergeable until Next adopts the TS7 API surface.
      #
      # This is ISOLATION, NOT SUPPRESSION — deliberately not an `ignore:`
      # entry. Dependabot still tracks typescript and still opens a PR for
      # each new major, so we keep the signal telling us when TS7 becomes
      # viable; it just can't hold the other majors hostage. Delete this group
      # (and the exclude-patterns above) once Next.js supports TypeScript 7.
      npm-typescript-major:
        patterns:
          - "typescript"
        update-types:
          - major
