# SonarCloud configuration
# https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/

sonar.organization=okpilot
sonar.projectKey=okpilot_lmsplus_v2
sonar.projectName=LMS Plus v2

# Source directories (co-located tests use test.inclusions, not sonar.tests)
sonar.sources=apps/web/app,apps/web/components,apps/web/lib,packages/db/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/dist/**,**/*.config.*,apps/web/components/ui/**,packages/db/src/types.ts

# Exclude feature UI components from coverage — tested via E2E, not jsdom
# Exclude DB integration-test infrastructure — its helper/.ts files (setup, seed,
# cleanup, vfr-rt-helpers) are exercised by integration specs run against a real
# Supabase, not by the unit-coverage lcov, so they read as 0%-covered production code.
# Same rationale for the app-layer integration tier (#925): lib/integration-support/*
# (harness, fixtures) is exercised by *.integration.test.ts against a real Supabase,
# not by the unit-coverage lcov.
sonar.coverage.exclusions=apps/web/app/app/admin/**/_components/**,packages/db/src/__integration__/**,apps/web/lib/integration-support/**

# Exclude from CPD (copy-paste detection):
# - SQL migrations: CREATE OR REPLACE re-states full bodies, inherently repetitive.
# - Test files: mock setup + parametric assertion blocks are intentionally repetitive;
#   clarity-per-test outweighs deduplication, and forced extraction hurts readability.
sonar.cpd.exclusions=packages/db/migrations/*.sql,supabase/migrations/*.sql,**/*.test.ts,**/*.test.tsx

# Coverage reports (lcov from Vitest v8 provider)
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info,packages/db/coverage/lcov.info

# TypeScript config paths
sonar.typescript.tsconfigPaths=apps/web/tsconfig.json,packages/db/tsconfig.json
